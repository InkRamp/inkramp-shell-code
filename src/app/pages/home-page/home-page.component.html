<div class="home-container">
  <h1>Incentive Management System</h1>
  <p class="welcome-text">Choose a microapp to continue.</p>
  <div class="mfe-grid">
    @for (mfe of mfeCards; track mfe.remoteName) {
      <a class="mfe-card" [routerLink]="['/', mfe.route]">
        <h2>{{ mfe.displayName }}</h2>
        <p>/{{ mfe.route }}</p>
      </a>
    }
  </div>
</div>
