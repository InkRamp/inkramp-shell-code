<header class="app-header">
  <div class="header-left">
    <h1 class="app-title">Incentive Management System</h1>
  </div>
  
  <div class="header-right">
    <span *ngIf="isAuthenticated && userInfo" class="user-info">
      {{ userInfo.name }}
    </span>
    <button *ngIf="isAuthenticated" class="btn-logout" (click)="logout()">Logout</button>
    <button *ngIf="!isAuthenticated" class="btn-login" (click)="login()">Login</button>
  </div>
</header>

<nav class="app-nav" *ngIf="isAuthenticated">
  <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-link">Home</a>
  <a routerLink="/rules" routerLinkActive="active" class="nav-link">Rules</a>
  <a routerLink="/sales" routerLinkActive="active" class="nav-link">Sales</a>
  <a routerLink="/reports" routerLinkActive="active" class="nav-link">Reports</a>
  <a routerLink="/users" routerLinkActive="active" class="nav-link">Users</a>
</nav>
