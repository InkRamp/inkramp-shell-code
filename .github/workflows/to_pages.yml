name: Deploy to ng-shell repository within this same org

on:
  push:
    branches:
      - main
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '21'  # Adjust the Node.js version as needed


    - name: Build Angular app
      run: |
            npm i
            # ng-shell is the name of other repo where these static assets are deployed
            npm run build -- --configuration production --base-href "/ng-shell/"
            #npm run build -- --output-path=dist/angular-poc-shell/browser

    - name: Debug dist
      run: ls -R dist


    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        personal_token: ${{ secrets.PAT_TOKEN }}
        external_repository: OpensourceKD/ng-shell
        publish_branch: main
        publish_dir: ./dist/shell-module


